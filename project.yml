name: LabOS
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_ASSET_PATHS: ""

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/MarkdownUI.git
    from: 2.4.1

targets:
  LabOSCore:
    type: framework
    platform: iOS
    sources:
      - Sources/LabOSCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: labos.LabOSCore
        GENERATE_INFOPLIST_FILE: YES

  LabOSApp:
    type: application
    platform: iOS
    sources:
      - Sources/LabOSApp
    resources:
      - path: Sources/LabOSApp/Resources
    dependencies:
      - target: LabOSCore
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: labos.LabOSApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: LabOS uses the camera to capture photos you attach to chat messages.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: LabOS uses the microphone for press-and-hold voice input in chat.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: LabOS uses your photo library so you can attach recent photos to chat messages.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"

  LabOSCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/LabOSCoreTests
    dependencies:
      - target: LabOSCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: labos.LabOSCoreTests
        GENERATE_INFOPLIST_FILE: YES

  LabOSAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/LabOSAppTests
    dependencies:
      - target: LabOSApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: labos.LabOSAppTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LabOSApp

  LabOSE2ETests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/LabOSE2ETests
    dependencies:
      - target: LabOSApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: labos.LabOSE2ETests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LabOSApp

schemes:
  LabOSApp:
    build:
      targets:
        LabOSApp: all
    test:
      targets:
        - LabOSCoreTests
        - LabOSAppTests
        - LabOSE2ETests
