name: Epoch
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_ASSET_PATHS: ""

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/MarkdownUI.git
    from: 2.4.1

targets:
  EpochCore:
    type: framework
    platform: iOS
    sources:
      - Sources/EpochCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.epoch.core
        GENERATE_INFOPLIST_FILE: YES

  EpochApp:
    type: application
    platform: iOS
    sources:
      - Sources/EpochApp
    resources:
      - path: Sources/EpochApp/Resources
    dependencies:
      - target: EpochCore
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.epoch.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: Epoch uses the camera to capture photos you attach to chat messages.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Epoch uses the microphone for press-and-hold voice input in chat.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Epoch uses your photo library so you can attach recent photos to chat messages.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"

  EpochCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/EpochCoreTests
    dependencies:
      - target: EpochCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.epoch.core-tests
        GENERATE_INFOPLIST_FILE: YES

  EpochAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/EpochAppTests
    dependencies:
      - target: EpochApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.epoch.app-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: EpochApp

  EpochE2ETests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/EpochE2ETests
    dependencies:
      - target: EpochApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.epoch.e2e-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: EpochApp

schemes:
  EpochApp:
    build:
      targets:
        EpochApp: all
    test:
      targets:
        - EpochCoreTests
        - EpochAppTests
        - EpochE2ETests
